syntax = "proto3";

package streaming;

// ---------- mensagens ----------
message User    { int32 id = 1; string name = 2; string email = 3; }
message Music   { int32 id = 1; string title = 2; string artist = 3;
                  string album = 4; int32 duration_seconds = 5; }
message Playlist{ int32 id = 1; string name = 2; int32 user_id = 3; }

message Id           { int32 id = 1; }
message Page         { int32 limit = 1; int32 offset = 2; }
message Empty        {}
message Ok           { bool ok = 1; }

message UserInput    { string name = 1; string email = 2; }
message UserPatch    { int32 id = 1; string name = 2; string email = 3; }
message MusicInput   { string title = 1; string artist = 2; string album = 3;
                       int32 duration_seconds = 4; }
message MusicPatch   { int32 id = 1; string title = 2; string artist = 3;
                       string album = 4; int32 duration_seconds = 5; }
message PlaylistInput{ string name = 1; int32 user_id = 2; }
message PlaylistPatch{ int32 id = 1; string name = 2; }

message PlaylistMusicInput { int32 playlist_id = 1; int32 music_id = 2;
                             int32 position = 3; }

message UserList     { repeated User users = 1; }
message MusicList    { repeated Music musics = 1; }
message PlaylistList { repeated Playlist playlists = 1; }

// ---------- serviço ----------
service StreamingService {
  // users
  rpc CreateUser (UserInput) returns (User);
  rpc GetUser    (Id)        returns (User);
  rpc ListUsers  (Page)      returns (UserList);
  rpc UpdateUser (UserPatch) returns (User);
  rpc DeleteUser (Id)        returns (Ok);

  // musics
  rpc CreateMusic (MusicInput) returns (Music);
  rpc GetMusic    (Id)         returns (Music);
  rpc ListMusics  (Page)       returns (MusicList);
  rpc UpdateMusic (MusicPatch) returns (Music);
  rpc DeleteMusic (Id)         returns (Ok);

  // playlists
  rpc CreatePlaylist (PlaylistInput) returns (Playlist);
  rpc GetPlaylist    (Id)            returns (Playlist);
  rpc ListPlaylists  (Page)          returns (PlaylistList);
  rpc UpdatePlaylist (PlaylistPatch) returns (Playlist);
  rpc DeletePlaylist (Id)            returns (Ok);

  // relações (consultas do enunciado)
  rpc ListUserPlaylists    (Id) returns (PlaylistList);
  rpc ListPlaylistMusics   (Id) returns (MusicList);
  rpc ListPlaylistsWithMusic (Id) returns (PlaylistList);
  rpc AddMusicToPlaylist     (PlaylistMusicInput) returns (Ok);
  rpc RemoveMusicFromPlaylist(PlaylistMusicInput) returns (Ok);
}
